name: Build Android (APK & AAB)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          build-tools: 34.0.0

      - name: Fix Corrupt Gradle Wrapper Jar
        run: |
          curl -Lo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      - name: Build and Sign Release APK & AAB
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decode the keystore from Base64 secret
          # Use printf and base64 -di for maximum robustness
          printf "%s" "$KEYSTORE_FILE" | base64 -di > android/app/release.keystore
          
          # Check if file was created and is not empty
          if [ ! -s android/app/release.keystore ]; then
            echo "Error: Keystore file is empty or decoding failed"
            exit 1
          fi
          
          # Build and sign using environment variables
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14
